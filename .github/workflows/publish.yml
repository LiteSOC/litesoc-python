# Publish litesoc to PyPI when a GitHub Release is created.
# Requires repository secret: PYPI_API_TOKEN (PyPI API token with upload scope)
name: Publish to PyPI

on:
  # Auto-publish when a GitHub Release is published
  release:
    types: [published]
  # Allow manual runs from the Actions tab (e.g. for an existing tag like v2.5.0)
  workflow_dispatch:

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
